name: Validation JMeter (transactions PH)

# Valide les plans JMeter du dossier load/ produits selon la convention ATAKAMA « PH ».
# Rappel doctrine : la CHARGE réelle est jouée par le cockpit / l'agent ph_jmeter, PAS ici.
# Cette CI fait donc :
#   1) un LINT structurel du .jmx (toujours utile, même sans exécution) ;
#   2) un TIR UNITAIRE best-effort : active les ThreadGroups « Tests TRxx » (1 VU) pour vérifier
#      que les transactions s'exécutent de bout en bout (validation fonctionnelle, pas de charge).
# Déclencheurs : PR touchant load/** (commente la PR) ; ou manuel (workflow_dispatch).
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ["load/**"]
  workflow_dispatch:
    inputs:
      host:
        description: "Hôte cible (sans https://)"
        default: "locimmo.onrender.com"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HOST: ${{ github.event.inputs.host || 'locimmo.onrender.com' }}
      JMETER_VERSION: "5.6.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installe JMeter (+ plugins jpgc best-effort)
        run: |
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
          tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"
          JM="$PWD/apache-jmeter-${JMETER_VERSION}"
          echo "$JM/bin" >> "$GITHUB_PATH"
          # Plugins jpgc requis pour CHARGER un plan PH (kg.apc.* : ParameterizedController, UltimateThreadGroup).
          # Téléchargement DIRECT des JAR depuis Maven Central (le PluginsManagerCMD ne s'installe pas en headless) :
          #   prmctl (+ deps cmn-jmeter, emulators) → ParameterizedController ; casutg → UltimateThreadGroup (au cas où).
          M="https://repo1.maven.org/maven2/kg/apc"
          for jar in \
            "jmeter-plugins-cmn-jmeter/0.6/jmeter-plugins-cmn-jmeter-0.6.jar" \
            "jmeter-plugins-emulators/0.2/jmeter-plugins-emulators-0.2.jar" \
            "jmeter-plugins-prmctl/0.4/jmeter-plugins-prmctl-0.4.jar" \
            "jmeter-plugins-casutg/2.10/jmeter-plugins-casutg-2.10.jar" ; do
            wget -q -O "$JM/lib/ext/$(basename "$jar")" "$M/$jar" && echo "  ✅ $(basename "$jar")" || echo "  ⚠️ $(basename "$jar")"
          done

      - name: Lint structurel des plans (convention PH)
        if: always()
        run: |
          python3 - <<'PY' > /tmp/lint.md
          import glob, os, re, xml.etree.ElementTree as ET
          out = ["## 🧪 Validation JMeter (convention ATAKAMA PH)", ""]
          plans = sorted(glob.glob("load/*.jmx"))
          if not plans:
              out.append("_Aucun plan `load/*.jmx`._")
          for p in plans:
              name = os.path.basename(p)
              try:
                  raw = open(p, encoding="utf-8").read()
                  ET.fromstring(raw)  # XML bien formé
              except Exception as e:
                  out += [f"### ❌ {name}", f"- XML invalide : `{e}`", ""]; continue
              # Structure JMeter : chaque élément suivi d'exactement un hashTree (jamais 2 <hashTree/> adjacents).
              def tree_ok(root):
                  def walk(ht):
                      ks = list(ht); i = 0
                      while i < len(ks):
                          if ks[i].tag == "hashTree": return False               # hashTree en trop
                          if i+1 >= len(ks) or ks[i+1].tag != "hashTree": return False  # élément sans hashTree
                          if not walk(ks[i+1]): return False
                          i += 2
                      return True
                  top = root.find("hashTree")
                  return walk(top) if top is not None else False
              struct_ok = tree_ok(ET.fromstring(raw))
              vars_defined = set(re.findall(r'Argument.name"?\s*>([A-Za-z0-9_\-]+)<', raw)) | set(
                  c for cs in re.findall(r'variableNames">([^<]+)<', raw) for c in cs.split(","))
              vars_used = set(re.findall(r'\$\{([A-Za-z0-9_\-]+)\}', raw))
              jm_builtin = {"__P","__jexl3","__groovy","__V","__time","__eval","JMeterThread"}
              undef = sorted(v for v in vars_used - vars_defined
                             if not any(b in v for b in jm_builtin) and not v.startswith("__"))
              checks = [
                  ("XML bien formé", True),
                  ("Structure JMeter valide (paires élément/hashTree)", struct_ok),
                  ("Fragment TRANSACTIONS", 'testname="TRANSACTIONS"' in raw),
                  ("Fragment FONCTIONS", 'testname="FONCTIONS"' in raw),
                  ("Blocs UDV paramétrés (${__P})", "UDV_" in raw and "__P(" in raw),
                  ("JDD login,pass référencé", "login,pass" in raw or "${CSV-TR" in raw),
                  ("Nommage TRxx_ présent", bool(re.search(r'TR0?\d', raw))),
                  ("guiclass CookiePanel (pas ...GUI)", "CookiePanelGUI" not in raw),
                  ("Variables toutes définies" + (f" (indéfinies: {undef[:5]})" if undef else ""), not undef),
                  ("Aucune injection ACTIVE (UltimateThreadGroup)",
                     not re.search(r'UltimateThreadGroup[^>]*enabled="[Tt]rue"', raw)),
              ]
              for csv in sorted(set(re.findall(r'>data/([A-Za-z0-9_.\-]+\.csv)<', raw))):
                  checks.append((f"CSV présent : data/{csv}", os.path.exists(os.path.join("load/data", csv))))
              ok = all(v for _, v in checks)
              out.append(f"### {'✅' if ok else '⚠️'} {name}")
              out += [f"- {'✅' if v else '❌'} {label}" for label, v in checks]
              out.append("")
          open("/tmp/lint.md", "w").write("\n".join(out))
          print("\n".join(out))
          PY

      - name: Warm-up de la cible (cold start Render)
        if: always()
        run: |
          for i in $(seq 1 24); do
            body=$(curl -s --max-time 15 "https://${HOST}/api/listings" || true)
            case "$body" in \[*|\{*) echo "cible prête"; break;; esac
            echo "warm-up $i…"; sleep 5
          done

      - name: Tir unitaire des transactions (best-effort, 1 VU)
        if: always()
        run: |
          mkdir -p load-results work/data
          for plan in load/*.jmx; do
            [ -e "$plan" ] || continue
            name=$(basename "$plan" .jmx)
            unit="load-results/${name}-unit.jmx"
            # Active les ThreadGroups « Tests TRxx » (1 VU) pour exécuter chaque transaction une fois.
            python3 - "$plan" "$unit" <<'PY'
          import sys, re
          src, dst = sys.argv[1], sys.argv[2]
          t = open(src, encoding="utf-8").read()
          # enabled="false" -> "true" sur les seuls ThreadGroups nommés "Tests ..."
          t = re.sub(r'(<ThreadGroup[^>]*testname="Tests [^"]*"[^>]*?)enabled="false"', r'\1enabled="true"', t)
          open(dst, "w", encoding="utf-8").write(t)
          print("unit plan:", dst)
          PY
            echo "▶ tir unitaire $name (host=$HOST, 1 VU)"
            jmeter -n -t "$unit" -Jhost="$HOST" -Jprojet="${name}" -Jwork="$PWD/work" \
              -Jjmeter.save.saveservice.print_field_names=true \
              -l "load-results/${name}.jtl" -j "load-results/${name}.log" || true
          done

      - name: Résumé du tir unitaire
        if: always()
        run: |
          python3 - <<'PY' >> /tmp/lint.md
          import csv, glob, os
          out = ["", "## 🎯 Tir unitaire des transactions (validation fonctionnelle — pas de charge)", ""]
          jtls = sorted(glob.glob("load-results/*.jtl"))
          if not jtls:
              out.append("_Aucun échantillon : injection non générée (gérée par le cockpit) ou plugins jpgc absents. Le lint ci-dessus reste la validation de référence._")
          for jtl in jtls:
              name = os.path.basename(jtl)[:-4]
              rows = list(csv.DictReader(open(jtl)))
              if not rows:
                  out += [f"### {name}", "_0 échantillon._", ""]; continue
              # par label de transaction/étape
              ok = sum(1 for r in rows if r.get("success") == "true")
              n = len(rows)
              lat = [int(r["elapsed"]) for r in rows if r.get("elapsed")]
              avg = sum(lat)//len(lat) if lat else 0
              status = "✅" if ok == n else "⚠️"
              out += [f"### {status} {name}",
                      f"- Échantillons : **{n}** · OK : **{ok}/{n}** · latence moy. : **{avg} ms**", ""]
          open("/tmp/lint.md", "a").write("\n".join(out))
          print("\n".join(out))
          PY

      - name: Upload artefacts (plans unitaires, jtl, logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-validation
          path: load-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commente la PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('/tmp/lint.md')
              ? fs.readFileSync('/tmp/lint.md', 'utf8')
              : '## 🧪 Validation JMeter\n_Résumé indisponible._';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body + "\n\n_Artefacts (plans unitaires, jtl, logs) : **jmeter-validation** du run. Charge réelle → cockpit / agent ph_jmeter._",
            });
