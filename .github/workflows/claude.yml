name: Claude Code

# Déclenche @claude sur les mentions dans issues / PR / commentaires.
on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted, edited]

jobs:
  claude:
    # Ne tourne que si "@claude" est mentionné (évite les runs inutiles).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    env:
      RENTAL_APP_BASE_URL: https://locimmo.onrender.com
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps + Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via token OAuth abonnement Claude Pro/Max (pas de clé API facturée à l'usage).
          # Généré en local avec: claude setup-token
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # MCP Playwright + outils autorisés (sinon @claude ne peut pas éditer/pousser en CI).
          claude_args: >-
            --mcp-config .github/claude-mcp.json
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash,mcp__playwright"

      # Preuve d'exécution : rapport HTML + captures + traces téléchargeables depuis le run.
      - name: Upload rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
