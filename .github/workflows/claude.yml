name: Claude Code

# Déclenche @claude sur les mentions dans issues / PR / commentaires.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Ne tourne que si "@claude" est mentionné (évite les runs inutiles).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps + Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via token OAuth abonnement Claude Pro/Max (pas de clé API facturée à l'usage).
          # Généré en local avec: claude setup-token
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # MCP Playwright : permet à @claude d'explorer LocImmo (DOM réel) pour des sélecteurs justes.
          # MCP Atlassian/Jira : à ajouter dans claude-mcp.json quand JIRA_BASE_URL/EMAIL seront connus.
          claude_args: >-
            --mcp-config .github/claude-mcp.json
