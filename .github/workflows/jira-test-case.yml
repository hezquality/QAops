name: Jira → Génération de test (@claude)

# Déclenché EN AUTONOMIE depuis Jira (règle d'automatisation → web request → repository_dispatch).
# Le scénario de test voyage dans client_payload : pas besoin de secrets Jira côté GitHub.
on:
  repository_dispatch:
    types: [jira-test-case]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      # URL publique de LocImmo (pas un secret) pour que `npm test` cible l'app live.
      RENTAL_APP_BASE_URL: https://locimmo.onrender.com
      # Accès Jira (secrets) : @claude lit le scénario du ticket via l'API REST.
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # Pour que `gh pr create` fonctionne depuis le job.
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps + Playwright browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Génère le test Playwright depuis le scénario Jira
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Autorise explicitement les outils dont @claude a besoin (sinon actions refusées en CI).
          claude_args: >-
            --mcp-config .github/claude-mcp.json
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash,mcp__playwright"
          prompt: |
            Tu génères un test Playwright à partir d'un scénario de test provenant de Jira.

            Ticket Jira : ${{ github.event.client_payload.jira_key }}

            1) Récupère le scénario depuis Jira (titre + description Gherkin) en exécutant :
               curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" -H "Accept: application/json" \
                 "$JIRA_BASE_URL/rest/api/2/issue/${{ github.event.client_payload.jira_key }}?fields=summary,description"
               Le champ `description` contient le scénario (Given/When/Then) à automatiser.

            2) Génère le test Playwright correspondant.

            Consignes (respecte STRICTEMENT CLAUDE.md) :
            - Réutilise les Page Objects existants (LoginPage, RegisterPage, NavbarComponent) et les fixtures ; AUCUN sélecteur brut dans le fichier de test.
            - Base URL = env RENTAL_APP_BASE_URL (LocImmo sur Render). DB vide → crée le compte via /register (factory makeUser). Prévois un warm-up (cold start possible).
            - Tag de traçabilité @${{ github.event.client_payload.jira_key }} dans le titre du test + test.info().annotations ({ type: 'jira', description: '${{ github.event.client_payload.jira_key }}' }).
            - Si un sélecteur manque, explore le DOM réel via le MCP Playwright.
            - Lance `npm test` (au moins le projet chromium) et corrige jusqu'au vert.
            - Crée une branche dédiée, commit, puis ouvre une PR décrivant le scénario et liée à ${{ github.event.client_payload.jira_key }}. NE MERGE JAMAIS — revue humaine obligatoire.
            - LIVRABLE OBLIGATOIRE : termine TOUJOURS par une PR ouverte. Si quelque chose bloque
              (sélecteur introuvable, test encore rouge malgré tes corrections), ouvre quand même la PR
              avec l'état atteint et documente le blocage dans son corps — ne pose pas de question en
              fin de tour : personne ne lit ta sortie, seule la PR est relue.

      # Preuve d'exécution : rapport HTML + captures + traces téléchargeables depuis le run.
      - name: Upload rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.client_payload.jira_key }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

      # Observabilité : la transcription de l'agent (tours, décisions) archivée avec le run.
      - name: Upload transcription de l'agent
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-${{ github.event.client_payload.jira_key }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14

      # Filet de sécurité : un run vert sans PR est un échec silencieux — on le rend visible.
      - name: Vérifie qu'une PR a été ouverte
        env:
          JIRA_KEY: ${{ github.event.client_payload.jira_key }}
        run: |
          if gh pr list --repo "${{ github.repository }}" --state open \
               --json title,headRefName --jq '.[] | "\(.title) \(.headRefName)"' \
               | grep -qi "$JIRA_KEY"; then
            echo "PR trouvée pour $JIRA_KEY"
          else
            echo "::error::L'agent a terminé sans ouvrir de PR pour $JIRA_KEY (échec silencieux)."
            exit 1
          fi
